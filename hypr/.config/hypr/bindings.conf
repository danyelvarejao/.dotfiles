# ---------------#
# Control tiling #
# ---------------#
bindd = SUPER, C, Close window, killactive,
bindd = SUPER, semicolon, Toggle window split, layoutmsg, togglesplit
bindd = SUPER, V, Toggle window floating/tiling, togglefloating,
bindd = SUPER, D, Full width, fullscreen, 1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Move focus with SUPER + arrow keys
bindd = SUPER, H, Move window focus left, movefocus, l
bindd = SUPER, J, Move window focus down, movefocus, d
bindd = SUPER, K, Move window focus up, movefocus, u
bindd = SUPER, L, Move window focus right, movefocus, r

# Resize active window
bindd = SUPER CTRL, H, Resize left, resizeactive, -100 0
bindd = SUPER CTRL, L, Resize right, resizeactive, 100 0
bindd = SUPER CTRL, K, Resize up, resizeactive, 0 -100
bindd = SUPER CTRL, J, Resize down, resizeactive, 0 100

# Switch workspaces
bindd = SUPER, Q, Switch to workspace 1, workspace, 1
bindd = SUPER, W, Switch to workspace 2, workspace, 2
bindd = SUPER, E, Switch to workspace 3, workspace, 3
bindd = SUPER, R, Switch to workspace 4, workspace, 4
bindd = SUPER, U, Switch to workspace 5, workspace, 5
bindd = SUPER, I, Switch to workspace 6, workspace, 6
bindd = SUPER, O, Switch to workspace 7, workspace, 7
bindd = SUPER, P, Switch to workspace 8, workspace, 8
# bindd = SUPER, 9, Switch to workspace 9, workspace, 9
# bindd = SUPER, 0, Switch to workspace 10, workspace, 10

# Move active window to a workspace
bindd = SUPER SHIFT, Q, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, W, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, E, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, R, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, U, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, I, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, O, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, P, Move window to workspace 8, movetoworkspace, 8
# bindd = SUPER SHIFT, 9, Move window to workspace 9, movetoworkspace, 9
# bindd = SUPER SHIFT, 0, Move window to workspace 10, movetoworkspace, 10

# Move active window silently to a workspace
# bindd = SUPER SHIFT ALT, Q, Move window silently to workspace 1, movetoworkspacesilent, 1
# bindd = SUPER SHIFT ALT, W, Move window silently to workspace 2, movetoworkspacesilent, 2
# bindd = SUPER SHIFT ALT, E, Move window silently to workspace 3, movetoworkspacesilent, 3
# bindd = SUPER SHIFT ALT, R, Move window silently to workspace 4, movetoworkspacesilent, 4
# bindd = SUPER SHIFT ALT, U, Move window silently to workspace 5, movetoworkspacesilent, 5
# bindd = SUPER SHIFT ALT, I, Move window silently to workspace 6, movetoworkspacesilent, 6
# bindd = SUPER SHIFT ALT, O, Move window silently to workspace 7, movetoworkspacesilent, 7
# bindd = SUPER SHIFT ALT, P, Move window silently to workspace 8, movetoworkspacesilent, 8
# bindd = SUPER SHIFT ALT, 9, Move window silently to workspace 9, movetoworkspacesilent, 9
# bindd = SUPER SHIFT ALT, 0, Move window silently to workspace 10, movetoworkspacesilent, 10

# TAB between workspaces
bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER, ESCAPE, Previous workspace, workspace, e-1

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r

# Cycle through applications on active workspace
# bindd = ALT, TAB, Cycle to next window, cyclenext
# bindd = ALT SHIFT, TAB, Cycle to prev window, cyclenext, prev
# bindd = ALT, TAB, Reveal active window on top, bringactivetotop
# bindd = ALT SHIFT, TAB, Reveal active window on top, bringactivetotop

# Scroll through existing workspaces with SUPER + scroll
# bindd = SUPER, mouse_down, Scroll active workspace forward, workspace, e+1
# bindd = SUPER, mouse_up, Scroll active workspace backward, workspace, e-1

# Toggle groups
# bindd = SUPER, G, Toggle window grouping, togglegroup
# bindd = SUPER ALT, G, Move active window out of group, moveoutofgroup

# Join groups
# bindd = SUPER ALT, LEFT, Move window to group on left, moveintogroup, l
# bindd = SUPER ALT, RIGHT, Move window to group on right, moveintogroup, r
# bindd = SUPER ALT, UP, Move window to group on top, moveintogroup, u
# bindd = SUPER ALT, DOWN, Move window to group on bottom, moveintogroup, d

# Navigate a single set of grouped windows
# bindd = SUPER ALT, TAB, Next window in group, changegroupactive, f
# bindd = SUPER ALT SHIFT, TAB, Previous window in group, changegroupactive, b

# Window navigation for grouped windows
# bindd = SUPER CTRL, LEFT, Move grouped window focus left, changegroupactive, b
# bindd = SUPER CTRL, RIGHT, Move grouped window focus right, changegroupactive, f

# Scroll through a set of grouped windows with SUPER + ALT + scroll
# bindd = SUPER ALT, mouse_down, Next window in group, changegroupactive, f
# bindd = SUPER ALT, mouse_up, Previous window in group, changegroupactive, b

# Activate window in a group by number
# bindd = SUPER ALT, code:10, Switch to group window 1, changegroupactive, 1
# bindd = SUPER ALT, code:11, Switch to group window 2, changegroupactive, 2
# bindd = SUPER ALT, code:12, Switch to group window 3, changegroupactive, 3
# bindd = SUPER ALT, code:13, Switch to group window 4, changegroupactive, 4
# bindd = SUPER ALT, code:14, Switch to group window 5, changegroupactive, 5

# ------------#
# Aplications #
# ------------#
# Open Terminal
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
# bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"

# Open Browser
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser

# Open File Manager
bindd = SUPER, F, File manager, exec, uwsm-app -- nautilus --new-window

# Open text editor
bindd = SUPER, N, Editor, exec, omarchy-launch-editor

# ----------#
# Utilities #
# ----------#
# Menus
bindd = CTRL ALT, DELETE, System menu, exec, omarchy-menu system
bindd = SUPER, SPACE, Launch apps, exec, omarchy-launch-walker
bindd = SUPER ALT, SPACE, Omarchy menu, exec, omarchy-menu
bindd = SUPER SHIFT, S, Capture menu, exec, omarchy-menu capture
bindd = SUPER, period, Emoji picker, exec, omarchy-launch-walker -m symbols
# bindd = SUPER CTRL, O, Toggle menu, exec, omarchy-menu toggle
bindd = SUPER, comma, Show key bindings, exec, omarchy-menu-keybindings

